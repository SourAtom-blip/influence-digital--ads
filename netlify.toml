[build]
  base    = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/api/*"
  to     = "https://influence-digital-ads-production.up.railway.app/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/uploads/*"
  to     = "https://influence-digital-ads-production.up.railway.app/uploads/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
